# MMC3 Linker Configuration (128KB PRG-ROM)
# Configured for PRG Mode 1 ($8000 fixed, $C000 swappable)

MEMORY {
    ZP:       start = $0000, size = $0100, type = rw;
    STACK:    start = $0100, size = $0100, type = rw;
    RAM:      start = $0200, size = $0600, type = rw;
    SRAM:     start = $6000, size = $2000, type = rw;

    # iNES Header
    HEADER:   start = $0000, size = $0010, type = ro, file = %O, fill = yes;

    # 128KB PRG-ROM (16 x 8KB Banks)
    # Banks 00-13: Swappable (Mapped to $A000 or $C000 dynamically)
    BANK00:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK01:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK02:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK03:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK04:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK05:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK06:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK07:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK08:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK09:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK0A:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK0B:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK0C:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;
    BANK0D:   start = $C000, size = $2000, type = ro, file = %O, fill = yes;

    # Bank 14: Fixed to $8000 in Mode 1 (Engine logic and large tables)
    PRG_8000: start = $8000, size = $2000, type = ro, file = %O, fill = yes;

    # Bank 15: Fixed to $E000 (Core audio driver, NMI, and Reset Vectors)
    PRG_E000: start = $E000, size = $2000, type = ro, file = %O, fill = yes;
}

SEGMENTS {
    HEADER:   load = HEADER, type = ro;
    ZEROPAGE: load = ZP, type = zp;
    BSS:      load = RAM, type = bss, define = yes;
    SRAM:     load = SRAM, type = bss, optional = yes;

    # DPCM Drum Samples (64-byte alignment required by hardware)
    DPCM_00:  load = BANK00, type = ro, optional = yes, align = 64;
    DPCM_01:  load = BANK01, type = ro, optional = yes, align = 64;
    DPCM_02:  load = BANK02, type = ro, optional = yes, align = 64;
    DPCM_03:  load = BANK03, type = ro, optional = yes, align = 64;
    DPCM_04:  load = BANK04, type = ro, optional = yes, align = 64;
    DPCM_05:  load = BANK05, type = ro, optional = yes, align = 64;
    DPCM_06:  load = BANK06, type = ro, optional = yes, align = 64;
    DPCM_07:  load = BANK07, type = ro, optional = yes, align = 64;
    DPCM_08:  load = BANK08, type = ro, optional = yes, align = 64;
    DPCM_09:  load = BANK09, type = ro, optional = yes, align = 64;
    DPCM_0A:  load = BANK0A, type = ro, optional = yes, align = 64;
    DPCM_0B:  load = BANK0B, type = ro, optional = yes, align = 64;
    DPCM_0C:  load = BANK0C, type = ro, optional = yes, align = 64;
    DPCM_0D:  load = BANK0D, type = ro, optional = yes, align = 64;

    # Fixed Engine Segments
    CODE_8000:load = PRG_8000, type = ro, optional = yes;
    CODE:     load = PRG_E000, type = ro, align = $100;
    RODATA:   load = PRG_E000, type = ro;
    VECTORS:  load = PRG_E000, type = ro, start = $FFFA;
}